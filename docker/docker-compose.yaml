version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: app.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=dev
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis
      - mysql
      - nsq
    networks:
      - app-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - app-network